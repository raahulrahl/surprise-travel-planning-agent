# Requirements
requirements:
  packages:
    - crewai>=0.80.0
    - crewai-tools>=0.1.0
    - langchain>=0.1.0
    - langchain-openai>=0.0.5
    - openai>=2.11.0
    - bindu==2026.1.12
    - python-dotenv>=1.0.1
    - pyyaml>=6.0
    - requests>=2.31.0
  system: []
  min_memory_mb: 512
  external_services:
    - OpenRouter API (or OpenAI API)
    - Mem0 API (optional, for memory features)

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  avg_time_per_agent_ms: 3000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  timeout_seconds: 180
  max_input_length_chars: 5000
  scalability: vertical

# Tool Restrictions
allowed_tools:
  - Research
  - Analyze
  - Plan
  - Schedule
  - Recommend
  - Calculate
  - Generate

# Rich Documentation
documentation:
  overview: |
    This agent specializes in surprise travel planning and personalized itinerary creation, 
    transforming simple travel requests into comprehensive travel adventures. It employs a 
    crew of specialized AI agents that work sequentially to research destinations, find 
    activities, select accommodations, plan transportation, and compile detailed itineraries.

    The agent excels at understanding traveler preferences, budget constraints, and special 
    requirements to create truly personalized travel experiences. It can handle various 
    travel types including romantic getaways, family vacations, adventure trips, and 
    cultural tours across different budget levels.

  use_cases:
    when_to_use:
      - User wants a complete travel plan for an upcoming trip
      - User needs inspiration for destination choices
      - User wants personalized activity recommendations
      - User needs help with itinerary scheduling and logistics
      - User wants to surprise someone with a planned trip
      - User needs budget planning for travel expenses
      - User requires accessibility or special needs planning

    when_not_to_use:
      - Simple flight or hotel booking (use booking agent)
      - Real-time travel updates or alerts (use travel alert system)
      - Visa or immigration assistance (use legal/travel documentation agent)
      - Currency exchange calculations (use finance calculator)
      - Travel insurance purchases (use insurance agent)

  input_structure: |
    Accepts travel planning requests with optional specifications:

    {
      "query": "Travel planning request or description",
      "destination_preference": "specific city/country or 'surprise me'",
      "travel_dates": "start_date to end_date or duration",
      "travelers": {
        "number": 2,
        "ages": [30, 28],
        "type": "couple/family/friends/solo"
      },
      "budget_level": "backpacker/budget/mid-range/luxury",
      "interests": ["beach", "food", "culture", "adventure"],
      "special_requirements": ["vegetarian", "wheelchair_access", "pet_friendly"]
    }

    Query constraints:
    - Max input length: 5000 characters
    - Max agents in crew: 5
    - Timeout: 180 seconds
    - Supported languages: English primary

  output_format: |
    Standard Travel Itinerary Output:
    {
      "success": true,
      "itinerary": {
        "title": "Personalized Travel Itinerary",
        "travel_summary": {
          "destination": "City, Country",
          "duration": "7 days",
          "travelers": "2 adults",
          "total_estimated_cost": "$2,500"
        },
        "daily_schedule": [
          {
            "day": 1,
            "date": "2024-06-15",
            "theme": "Arrival & Acclimation",
            "activities": [
              {
                "time": "14:00",
                "activity": "Hotel Check-in",
                "location": "Hotel Name, Address",
                "description": "Check into your accommodation",
                "duration": "1 hour",
                "cost": "Included"
              }
            ],
            "meals": {
              "breakfast": "Hotel breakfast",
              "lunch": "Local café recommendation",
              "dinner": "Fine dining restaurant"
            },
            "transportation": "Airport transfer included",
            "accommodation": "Hotel Name, Room Type",
            "notes": "Jet lag recovery day"
          }
        ],
        "important_information": {
          "emergency_contacts": ["Local emergency: 112"],
          "currency": "EUR (Euro)",
          "language": "French (English widely spoken)",
          "time_zone": "CET (UTC+1)",
          "electrical_plugs": "Type E"
        },
        "budget_breakdown": {
          "accommodation": "$1,200",
          "transportation": "$500",
          "activities": "$400",
          "dining": "$300",
          "miscellaneous": "$100"
        }
      },
      "metadata": {
        "query": "original_query",
        "processing_time_ms": 12000,
        "agents_used": 3,
        "tasks_completed": 3,
        "crew_workflow": "sequential"
      }
    }

    Destination Recommendations Output:
    {
      "success": true,
      "recommendations": [
        {
          "destination": "Bali, Indonesia",
          "best_for": "Romantic getaways, Beach lovers",
          "best_time_to_visit": "April-October",
          "highlights": ["Ubud temples", "Beach clubs", "Rice terraces"],
          "estimated_cost_for_week": "$1,800-2,500",
          "travel_tips": ["Learn basic Indonesian phrases", "Respect temple dress codes"]
        }
      ],
      "metadata": {
        "processing_time_ms": 8000,
        "agents_used": 2
      }
    }

  error_handling:
    - "Destination not found: Suggests similar alternatives or asks for clarification"
    - "Budget too low: Provides budget-friendly alternatives or suggests adjusting expectations"
    - "No available activities: Expands search criteria or suggests different dates"
    - "API rate limits: Queues requests or suggests simpler queries"
    - "Crew initialization failed: Returns initialization error with troubleshooting steps"
    - "Timeout: Returns partial itinerary with completion percentage"
    - "Unclear input: Provides guidance on acceptable input formats"

  examples:
    - title: "Romantic Paris Getaway"
      input:
        query: "Plan a surprise romantic trip to Paris for 7 days"
        travelers:
          number: 2
          type: "couple"
        budget_level: "mid-range"
        interests: ["romance", "food", "culture"]
      output:
        success: true
        itinerary:
          title: "Romantic Parisian Escape - 7 Days"
          travel_summary:
            destination: "Paris, France"
            duration: "7 days"
            total_estimated_cost: "$3,200"
        metadata:
          processing_time_ms: 14500
          agents_used: 3

    - title: "Family Tokyo Adventure"
      input:
        query: "Create a family vacation to Tokyo with kids aged 5 and 8"
        travelers:
          number: 4
          ages: [35, 33, 8, 5]
          type: "family"
        budget_level: "mid-range"
        interests: ["family_friendly", "anime", "technology"]
      output:
        success: true
        itinerary:
          title: "Tokyo Family Adventure - 10 Days"
          travel_summary:
            destination: "Tokyo, Japan"
            duration: "10 days"
            total_estimated_cost: "$5,800"
        metadata:
          processing_time_ms: 18000
          agents_used: 3

    - title: "Southeast Asia Backpacking"
      input:
        query: "Design a budget backpacking trip through Southeast Asia for 3 weeks"
        destination_preference: "surprise me"
        travelers:
          number: 1
          type: "solo"
        budget_level: "backpacker"
        interests: ["adventure", "local_culture", "budget_travel"]
      output:
        success: true
        itinerary:
          title: "Southeast Asia Backpacking Adventure - 21 Days"
          travel_summary:
            destination: "Thailand, Cambodia, Vietnam"
            duration: "21 days"
            total_estimated_cost: "$1,200"
        metadata:
          processing_time_ms: 22000
          agents_used: 3

  best_practices:
    for_developers:
      - "Provide specific travel dates or seasons for accurate recommendations"
      - "Include traveler ages and composition for age-appropriate activities"
      - "Specify budget level clearly for appropriate recommendations"
      - "List key interests to prioritize relevant activities"
      - "Mention any special requirements or restrictions upfront"
      - "Use the budget breakdown to adjust plans if needed"

    for_orchestrators:
      - "Route travel planning and itinerary requests to this agent"
      - "Chain with translation agents for multilingual itineraries"
      - "Combine with booking agents for actual reservations"
      - "Use with weather agents for seasonal planning"
      - "Consider input complexity when setting timeout values"
      - "Implement caching for popular destination queries"

  installation: |
    Required packages:
    pip install crewai crewai-tools langchain langchain-openai bindu openai python-dotenv pyyaml requests

    Environment variables:
    OPENROUTER_API_KEY=your_openrouter_api_key
    OPENAI_API_KEY=your_openai_api_key  # Alternative
    MEM0_API_KEY=your_mem0_api_key  # Optional
    MODEL_NAME=openai/gpt-4o  # Optional, default

    For travel research:
    # No additional system dependencies required
    # Uses internet search tools via CrewAI tools

  versioning:
    - version: "1.0.0"
      date: "2026-01-15"
      changes: "Initial release with 3-agent crew for destination research, activity planning, and itinerary compilation"
    - version: "1.1.0"
      status: "planned"
      changes: "Add integration with travel booking APIs and real-time availability"
    - version: "1.2.0"
      status: "planned"
      changes: "Enhanced budget tracking and currency conversion features"


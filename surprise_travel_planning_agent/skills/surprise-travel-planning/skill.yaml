# Surprise Travel Planning and Itinerary Development Skill
# AI-powered travel planning assistant combining destination research, activity scheduling, and personalized itinerary creation

# Basic Metadata
id: surprise-travel-planning-v1
name: surprise-travel-planning
version: 1.0.0
author: paras25619@gmail.com

# Description
description: |
  An AI-powered travel planning assistant that designs personalized, surprise travel itineraries 
  based on user preferences, budget, and interests. This skill transforms travel requests into 
  complete, exciting travel adventures with destination suggestions, activity scheduling, 
  accommodation recommendations, and detailed day-by-day planning. Using a crew of specialized 
  AI agents, it researches destinations, finds activities, selects dining options, and compiles 
  comprehensive travel plans with all necessary details.

# Tags and Modes
tags:
  - travel-planning
  - itinerary
  - trip-planning
  - vacation
  - adventure
  - destination-research
  - activity-scheduling
  - personalized-travel
  - surprise-trip
  - holiday-planning
  - tourism
  - budget-travel
  - luxury-travel
  - family-vacation
  - romantic-getaway

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Plan a surprise romantic getaway to Paris for 7 days"
  - "Create a family vacation itinerary to Tokyo with kids aged 5 and 8"
  - "Design a budget backpacking trip through Southeast Asia for 3 weeks"
  - "Organize a luxury honeymoon package to the Maldives"
  - "Plan a surprise birthday trip to New York City for a food lover"


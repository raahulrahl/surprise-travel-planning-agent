id: surprise-travel-planning-v1
name: surprise-travel-planning
version: 1.0.0
author: paras25619@gmail.com

# Description
description: |
  Designs personalized and surprise travel itineraries based on traveler
  preferences, budget, interests, and constraints. Generates complete,
  structured travel adventures including destination selection, daily
  schedules, accommodation suggestions, logistics planning, and budget
  breakdowns.

# Tags and Modes
tags:
  - travel
  - itinerary
  - surprise-trip
  - vacation
  - destination-research
  - personalized-travel
  - adventure
  - tourism
  - budget-planning

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Plan a surprise romantic getaway to Paris for 7 days"
  - "Create a family vacation itinerary to Tokyo with kids aged 5 and 8"
  - "Design a budget backpacking trip through Southeast Asia for 3 weeks"
  - "Organize a luxury honeymoon package to the Maldives"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Generates complete personalized or surprise travel itineraries with structured planning"
    features:
      - "Selects destinations based on preferences or surprise logic"
      - "Creates day-by-day structured travel schedules"
      - "Provides accommodation recommendations"
      - "Builds transportation and logistics guidance"
      - "Generates detailed budget breakdowns"
      - "Adapts plans to traveler type (solo, couple, family, group)"
    limitations: "Does not perform real-time bookings, live pricing validation, visa processing, or transactional operations"

  secondary_capability:
    supported: true
    description: "Optimizes travel experience based on constraints and personalization signals"
    features:
      - "Adapts activities based on age and physical suitability"
      - "Balances itinerary density and rest periods"
      - "Flags budget feasibility"
      - "Provides themed or surprise trip logic"
      - "Includes contingency and safety considerations"

# Requirements
requirements:
  packages:
    - "crewai"
    - "langchain"
    - "openai or openrouter"
    - "pyyaml"
    - "requests"
  system:
    - "Internet access for destination research"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  scalability: vertical

# Tool Restrictions
allowed_tools:
  - Research
  - Analyze
  - Plan
  - Schedule
  - Recommend
  - Calculate
  - Generate

# Rich Documentation
documentation:
  overview: |
    This skill specializes in surprise and personalized travel planning.
    It transforms high-level travel ideas into structured, realistic
    itineraries with destination research, scheduling, cost estimation,
    and logistical feasibility checks. Designed for structured outputs
    and ecosystem consistency.

  use_cases:
    when_to_use:
      - "Planning complete travel itineraries"
      - "Designing surprise trips"
      - "Creating themed travel experiences"
      - "Family, romantic, or group vacation planning"
      - "Budget estimation for trips"

    when_not_to_use:
      - "Flight or hotel booking transactions"
      - "Visa or immigration services"
      - "Real-time travel alerts"
      - "Insurance purchase"
      - "Currency exchange operations"

  input_structure: |
    Accepts travel requests in plain text or JSON format.

    Example (Plain Text):
    "Plan a surprise romantic 7-day trip for a couple with a mid-range budget."

    Example (JSON):
    {
      "destination_preference": "specific location or 'surprise me'",
      "duration_days": 7,
      "travel_dates": "2026-06-01 to 2026-06-07",
      "travelers": {
        "number": 2,
        "ages": [30, 28],
        "type": "couple | family | solo | group"
      },
      "budget_level": "backpacker | budget | mid_range | luxury",
      "interests": ["food", "culture", "adventure"],
      "special_requirements": ["vegetarian", "wheelchair_access"]
    }

    Constraints:
    - Either duration_days OR travel_dates required
    - Maximum duration: 30 days
    - Traveler count ≥ 1
    - Budget level required if cost optimization needed
    - Minimum input length: 10 words
    - Maximum input length: ~5,000 words
    - Language: English

  output_format: |
    Returns structured itinerary analysis.

    Output Structure:

    - TRAVEL SUMMARY:
      - DESTINATION
      - DURATION (days)
      - TRAVELER TYPE
      - BUDGET LEVEL
      - ESTIMATED TOTAL COST
      - SURPRISE FACTOR (Low / Medium / High)

    - DESTINATION RATIONALE:
      - Why selected
      - Seasonal suitability
      - Fit with stated interests

    - ACCOMMODATIONS:
      For each option:
        - NAME
        - TYPE
        - AREA
        - ESTIMATED COST RANGE
        - SUITABILITY NOTES

    - DAILY ITINERARY:
      For each day:
        - DAY NUMBER
        - THEME
        - ACTIVITIES:
            - TITLE
            - TIME BLOCK
            - LOCATION
            - ESTIMATED COST
        - DAILY ESTIMATED COST

    - TRANSPORTATION PLAN:
      - ARRIVAL STRATEGY
      - LOCAL TRANSPORT OPTIONS
      - TRANSFER RECOMMENDATIONS

    - BUDGET BREAKDOWN:
      - ACCOMMODATION
      - TRANSPORTATION
      - ACTIVITIES
      - DINING
      - MISCELLANEOUS
      - TOTAL ESTIMATED

    - IMPORTANT INFORMATION:
      - LOCAL EMERGENCY INFO
      - CURRENCY
      - LANGUAGE
      - SAFETY NOTES

    - OVERALL EXPERIENCE SCORE:
      - PERSONALIZATION SCORE (A–F)
      - FEASIBILITY SCORE (A–F)
      - VALUE SCORE (A–F)
      - RECOMMENDATIONS (≤ 30 words)

  error_handling:
    - "Missing duration: Returns error requesting travel duration or dates"
    - "Invalid traveler structure: Returns validation error"
    - "Duration exceeds 30 days: Returns constraint error"
    - "Unsupported booking request: Returns capability limitation"
    - "Tool timeout: Retries up to 3 times with backoff"
    - "Insufficient preferences: Generates conservative itinerary with assumptions noted"

  examples:
    - title: "Romantic Surprise Trip"
      input:
        duration_days: 7
        travelers:
          number: 2
          type: "couple"
        budget_level: "mid_range"
        interests: ["romance", "food"]
      output:
        travel_summary:
          destination: "Paris, France"
          duration_days: 7
          estimated_total_cost: "$3,200"
          surprise_factor: "Medium"
        personalization_score: "A"
        feasibility_score: "A"
        processing_time_ms: 14500

  best_practices:
    for_developers:
      - "Ensure surprise logic still respects constraints"
      - "Balance activity density with rest"
      - "Validate traveler ages for activity suitability"
      - "Clearly state planning assumptions"

    for_orchestrators:
      - "Route surprise or personalized travel queries here"
      - "Chain with translation agents if multilingual output required"
      - "Allow 20–30 second timeout for complex trips"
      - "Use caching for common destinations"

  installation: |
    Required packages:
    uv sync

    Environment variables:
    - OPENAI_API_KEY or OPENROUTER_API_KEY
    - MEM0_API_KEY (optional)

    Quick start:
    1. Clone repository
    2. Configure .env
    3. Run: uv venv --python 3.12
    4. Run: uv sync
    5. Start agent module

  versioning:
    - version: "1.0.0"
      date: "2026-01-15"
      changes: "Initial release with structured surprise itinerary generation and personalization scoring"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "travel"
    - "surprise trip"
    - "itinerary"
    - "vacation"
    - "romantic getaway"
    - "family vacation"
    - "budget travel"
    - "luxury travel"
    - "destination planning"

  specializations:
    - domain: "surprise travel planning"
      confidence_boost: 0.4
    - domain: "itinerary generation"
      confidence_boost: 0.3
    - domain: "personalized travel"
      confidence_boost: 0.3

  anti_patterns:
    - "book flight"
    - "hotel reservation"
    - "visa processing"
    - "insurance purchase"
    - "real-time alerts"

  complexity_indicators:
    simple:
      - "weekend getaway"
      - "single destination short trip"
    medium:
      - "family vacation"
      - "multi-city itinerary"
    complex:
      - "multi-country tour"
      - "extended backpacking"
      - "high-surprise mystery trip"
